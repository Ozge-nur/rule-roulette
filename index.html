<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yıldız Avcısı (Kabus Modu)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        /* Modern Hareketli Arkaplan Gradient Sürümü */
        body { 
            background: linear-gradient(-45deg, #020617, #1e1b4b, #0f172a, #0b0f19);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white; 
            font-family: 'Outfit', sans-serif;
            user-select: none; 
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .mono-font { font-family: 'Space Mono', monospace; }
        
        /* Glassmorphism Paneller */
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        /* Daha şık bir Grid Arka Planı (Tron / Cyberpunk Havası) */
        .grid-bg { 
            background-color: rgba(2, 6, 23, 0.8);
            background-image: 
                linear-gradient(rgba(56, 189, 248, 0.15) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(56, 189, 248, 0.15) 1px, transparent 1px); 
            background-size: 30px 30px; 
            width: 450px; 
            height: 450px;
            position: relative;
            border: 2px solid rgba(56, 189, 248, 0.5);
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(14, 165, 233, 0.2), inset 0 0 20px rgba(0,0,0,0.8);
            margin: 0 auto;
            backdrop-filter: blur(8px);
        }

        .emoji-icon {
            font-size: 22px; 
            line-height: 30px;
            text-align: center;
        }

        .player-sprite {
            position: absolute;
            transition: top 0.15s cubic-bezier(0.34, 1.56, 0.64, 1), left 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
            width: 30px;
            height: 30px;
            z-index: 20;
            filter: drop-shadow(0 0 10px #38bdf8);
            transform: scale(1.1);
        }

        .star-sprite {
            position: absolute;
            width: 30px;
            height: 30px;
            z-index: 10;
            filter: drop-shadow(0 0 12px #fbbf24);
            animation: float 1.5s ease-in-out infinite alternate;
        }

        .trap-sprite {
            position: absolute;
            width: 30px;
            height: 30px;
            z-index: 15;
            filter: drop-shadow(0 0 8px #f43f5e);
            animation: pulse-trap 2s infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px) scale(0.9); }
            100% { transform: translateY(-5px) scale(1.15); }
        }

        @keyframes pulse-trap {
            0%, 100% { transform: scale(0.9); filter: drop-shadow(0 0 5px #f43f5e); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 15px #f43f5e); }
        }

        .shake {
            animation: shake-animation 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake-animation {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px) rotate(-1deg); }
            40%, 80% { transform: translateX(6px) rotate(1deg); }
        }

        /* Yeni Özel Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(56, 189, 248, 0.5); border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-8 px-4">
    
    <div id="app" class="w-full max-w-2xl"></div>

    <script>
        const GRID_SIZE = 15;
        const CELL_SIZE = 30; 
        const RULE_LIFETIME = 8; 

        let scene = 'lobby'; 
        let player = { gender: 'boy', x: 0, y: 0, history: [] };
        let star = null; 
        let traps = [];
        let score = 0;
        let highestScore = localStorage.getItem('highestScore') || 0;
        let activeRules = [];
        
        // Ceza sistemi (2 sn dondurma)
        let isFrozen = false;
        let freezeMessage = "";

        const RULES = [
            { id: 'noRight', text: 'SAĞ YASAK', desc: 'Sağ Oka Veya D Tuşuna Basma', check: (dir) => dir !== 'right' },
            { id: 'noLeft', text: 'SOL YASAK', desc: 'Sol Oka Veya A Tuşuna Basma', check: (dir) => dir !== 'left' },
            { id: 'noUp', text: 'YUKARI YASAK', desc: 'Üst Oka Veya W Tuşuna Basma', check: (dir) => dir !== 'up' },
            { id: 'noDown', text: 'AŞAĞI YASAK', desc: 'Alt Oka Veya S Tuşuna Basma', check: (dir) => dir !== 'down' },
            { id: 'noRepeat', text: 'ZİKZAK ZORUNLU', desc: 'Son gittiğin yöne tekrar gitme', check: (dir, history) => dir !== history[history.length - 1] }
        ];

        const appDiv = document.getElementById('app');

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playBeep(freq, type, duration, vol=0.1) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function render() {
            if (scene === 'lobby') renderLobby();
            else if (scene === 'game') renderGame();
            else if (scene === 'gameover') renderGameOver();
            else if (scene === 'howtoplay') renderHowToPlay();
        }

        function startGame() {
            scene = 'game';
            score = 0;
            activeRules = [];
            traps = [];
            isFrozen = false;
            player.x = Math.floor(GRID_SIZE / 2); 
            player.y = Math.floor(GRID_SIZE / 2);
            player.history = [];
            spawnStar();
            render();
        }

        function isPosEmpty(x, y) {
            if (x === player.x && y === player.y) return false;
            if (star && star.x === x && star.y === y) return false;
            if (traps.some(t => t.x === x && t.y === y)) return false;
            return true;
        }

        function spawnStar() {
            let nx, ny;
            do {
                nx = Math.floor(Math.random() * GRID_SIZE);
                ny = Math.floor(Math.random() * GRID_SIZE);
            } while (!isPosEmpty(nx, ny));
            star = { x: nx, y: ny };
        }

        function spawnTrap() {
            let nx, ny;
            do {
                nx = Math.floor(Math.random() * GRID_SIZE);
                ny = Math.floor(Math.random() * GRID_SIZE);
            } while (!isPosEmpty(nx, ny));
            traps.push({ x: nx, y: ny });
        }

        function addAiRule() {
            const activeIds = activeRules.map(r => r.id);
            const available = RULES.filter(r => !activeIds.includes(r.id));
            if (available.length > 0) {
                const randomRule = available[Math.floor(Math.random() * available.length)];
                activeRules.push({ id: randomRule.id, remaining: RULE_LIFETIME });
            } else {
                activeRules = [];
            }
        }

        function triggerError(msg) {
            if(isFrozen) return;
            
            playBeep(200, 'sawtooth', 0.5, 0.2); // Hata Sesi
            isFrozen = true;
            freezeMessage = msg;
            
            const gridDiv = document.getElementById('grid-container');
            if(gridDiv) gridDiv.classList.add('shake');
            
            render(); // Ekranı yenile Overlay'i getir
            
            setTimeout(() => {
                isFrozen = false;
                if(scene === 'game') render(); // 2 saniye sonra overlayi kaldır
            }, 2000);
        }

        function movePlayer(dir) {
            if (isFrozen) return; // Ceza süresince kıpırdayamaz

            for (let ruleData of activeRules) {
                let ruleObj = RULES.find(r => r.id === ruleData.id);
                if (ruleObj && !ruleObj.check(dir, player.history)) {
                    triggerError("KURAL İHLALİ!");
                    return; 
                }
            }

            playBeep(500, 'sine', 0.08, 0.05);

            let nx = player.x;
            let ny = player.y;

            if (dir === 'up') ny--;
            if (dir === 'down') ny++;
            if (dir === 'left') nx--;
            if (dir === 'right') nx++;

            if (nx < 0) nx = GRID_SIZE - 1;
            else if (nx >= GRID_SIZE) nx = 0;
            if (ny < 0) ny = GRID_SIZE - 1;
            else if (ny >= GRID_SIZE) ny = 0;

            player.x = nx;
            player.y = ny;
            player.history.push(dir);

            if (traps.some(t => t.x === player.x && t.y === player.y)) {
                playBeep(100, 'square', 1.0, 0.4);
                if (score > highestScore) {
                    highestScore = score;
                    localStorage.setItem('highestScore', highestScore);
                }
                scene = 'gameover';
                render();
                return;
            }

            if (star && player.x === star.x && player.y === star.y) {
                score++;
                playBeep(880, 'square', 0.15, 0.1);
                setTimeout(()=>playBeep(1320, 'square', 0.2, 0.1), 100);

                spawnStar();
                addAiRule(); 
                
                if(score % 2 === 0) spawnTrap();
            }

            for (let i = activeRules.length - 1; i >= 0; i--) {
                activeRules[i].remaining--;
                if (activeRules[i].remaining <= 0) {
                    activeRules.splice(i, 1);
                }
            }

            render();
        }

        window.addEventListener('keydown', (e) => {
            if (scene !== 'game') return;
            switch(e.key.toLowerCase()) {
                case 'w': case 'arrowup': movePlayer('up'); break;
                case 's': case 'arrowdown': movePlayer('down'); break;
                case 'a': case 'arrowleft': movePlayer('left'); break;
                case 'd': case 'arrowright': movePlayer('right'); break;
            }
        });

        // --- HTML RENDER KISMI --- //
        function renderLobby() {
            appDiv.innerHTML = `
                <div class="glass-panel p-10 rounded-3xl mx-auto max-w-sm w-full mt-10 text-center relative overflow-hidden">
                    
                    <div class="absolute -top-10 -right-10 w-32 h-32 bg-sky-500 rounded-full mix-blend-screen filter blur-[60px] opacity-20"></div>
                    <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-rose-500 rounded-full mix-blend-screen filter blur-[60px] opacity-20"></div>

                    <h1 class="font-black mb-2 text-transparent bg-clip-text bg-gradient-to-r from-sky-400 to-indigo-400 text-4xl tracking-tighter shadow-sm">
                        YILDIZ<br>AVCISI
                    </h1>
                    <div class="inline-block bg-rose-500/20 border border-rose-500/30 text-rose-300 text-xs font-bold px-3 py-1 rounded-full mb-8 tracking-widest shadow-lg">
                        KABUS MODU
                    </div>

                    <div class="bg-black/40 rounded-2xl p-4 mb-6 border border-white/5">
                        <div class="text-xs text-slate-400 mb-1 font-bold tracking-widest">KİŞİSEL REKOR</div>
                        <div class="text-4xl text-amber-400 font-black mix-blend-plus-lighter">${highestScore} <span class="text-xl">🌟</span></div>
                    </div>

                    <div class="mb-8">
                        <label class="block text-xs font-bold text-slate-400 mb-3 tracking-widest">KARAKTER SEÇ</label>
                        <div class="flex gap-4">
                            <button onclick="player.gender='boy'; render()" class="flex-1 py-4 rounded-2xl transition-all duration-300 ${player.gender === 'boy' ? 'border-2 border-sky-400 bg-gradient-to-b from-sky-900/40 to-slate-900 shadow-[0_0_20px_rgba(56,189,248,0.2)] transform scale-105' : 'border border-slate-700 bg-slate-900/50 hover:bg-slate-800'}">
                                <div class="text-4xl mb-1 filter drop-shadow-sm">👦</div>
                            </button>
                            <button onclick="player.gender='girl'; render()" class="flex-1 py-4 rounded-2xl transition-all duration-300 ${player.gender === 'girl' ? 'border-2 border-pink-400 bg-gradient-to-b from-pink-900/40 to-slate-900 shadow-[0_0_20px_rgba(244,114,182,0.2)] transform scale-105' : 'border border-slate-700 bg-slate-900/50 hover:bg-slate-800'}">
                                <div class="text-4xl mb-1 filter drop-shadow-sm">👧</div>
                            </button>
                        </div>
                    </div>

                    <button onclick="startGame()" class="w-full bg-gradient-to-r from-sky-500 to-indigo-600 hover:from-sky-400 hover:to-indigo-500 text-white font-bold py-4 rounded-2xl shadow-[0_10px_25px_-5px_rgba(56,189,248,0.5)] transition-all transform active:scale-95 text-lg tracking-wide">
                        Maceraya Başla
                    </button>
                    
                    <button onclick="scene='howtoplay'; render()" class="mt-4 text-sm text-slate-400 hover:text-white transition-colors underline decoration-slate-600 underline-offset-4">
                        Nasıl Oynanır?
                    </button>
                </div>
            `;
        }

        function renderHowToPlay() {
             appDiv.innerHTML = `
                <div class="glass-panel p-8 rounded-3xl mx-auto max-w-sm w-full mt-10 relative text-left">
                    <h2 class="text-2xl font-black text-white mb-6 tracking-tight">Oyun Rehberi</h2>
                    
                    <div class="space-y-4 text-sm text-slate-300 font-medium">
                        <div class="flex gap-4 items-start bg-white/5 p-4 rounded-xl border border-white/5">
                            <span class="text-2xl">🌟</span>
                            <p>Oyunun amacı yıldızları toplamaktır. Her yıldız 1 puandır.</p>
                        </div>
                        <div class="flex gap-4 items-start bg-white/5 p-4 rounded-xl border border-white/5">
                            <span class="text-2xl">🤖</span>
                            <p>Her yıldız aldığında yapay zeka <b>Süreli bir Yasak Kuralı</b> ekler. Uymazsan <span class="text-red-400 font-bold">2 saniye donma cezası</span> alırsın!</p>
                        </div>
                        <div class="flex gap-4 items-start bg-white/5 p-4 rounded-xl border border-white/5">
                            <span class="text-2xl">💣</span>
                            <p>Puanın arttıkça haritada ölümcül bombalar belirir. Çarparsan oyun anında biter.</p>
                        </div>
                        <div class="flex gap-4 items-start bg-white/5 p-4 rounded-xl border border-white/5">
                            <span class="text-2xl">🔀</span>
                            <p>Pac-Man mekaniği devrededir. Ekranın sağından çıkarsan solundan girersin! Bunu kullanarak yıldızlara ve tuzaklara kolayca ulaş/kaç.</p>
                        </div>
                    </div>

                    <button onclick="scene='lobby'; render()" class="mt-8 w-full bg-slate-700 hover:bg-slate-600 text-white font-bold py-4 rounded-2xl transition-all text-lg">
                        Geri Dön
                    </button>
                </div>
             `;
        }

        function renderGameOver() {
            appDiv.innerHTML = `
                <div class="glass-panel p-10 rounded-3xl shadow-2xl mx-auto max-w-sm w-full mt-10 text-center border-rose-900/50 ring-1 ring-inset ring-rose-500/20 relative overflow-hidden">
                    
                    <div class="absolute inset-0 bg-rose-900/10 z-0"></div>

                    <h1 class="font-black mb-2 text-rose-500 text-5xl tracking-tighter drop-shadow-md relative z-10">
                        ÖLDÜN
                    </h1>
                    <p class="text-rose-200/80 mb-8 font-medium text-sm relative z-10">Tuzaklara yakalandın!</p>
                    
                    <div class="bg-black/60 border border-rose-900/50 p-6 rounded-2xl mb-8 relative z-10 backdrop-blur-md">
                        <div class="text-xs text-rose-400 mb-1 font-bold tracking-widest">BU TURKİ SKORUN</div>
                        <div class="text-5xl text-white font-black mb-6 drop-shadow-lg">${score} <span class="text-2xl">🌟</span></div>
                        
                        <div class="w-full h-px bg-rose-900/50 mb-6"></div>

                        <div class="text-[10px] text-slate-400 mb-1 font-bold tracking-widest">EN İYİ REKORUN</div>
                        <div class="text-2xl text-amber-500 font-bold">${highestScore} 🏆</div>
                    </div>

                    <button onclick="startGame()" class="w-full relative z-10 bg-white text-black hover:bg-slate-200 font-bold py-4 rounded-2xl shadow-[0_5px_20px_rgba(255,255,255,0.3)] transition-all transform active:scale-95 text-lg tracking-wide">
                        Tekrar Dene
                    </button>
                </div>
            `;
        }

        function renderGame() {
            let ruleHtml = activeRules.map(rData => {
                let rObj = RULES.find(r => r.id === rData.id);
                let isCritical = rData.remaining <= 3;
                let bgClass = isCritical ? 'bg-rose-500/10 border-rose-500/40' : 'bg-slate-800/50 border-white/10';
                let textColor = isCritical ? 'text-rose-400' : 'text-sky-300';
                
                return `<div class="flex flex-col gap-1 ${bgClass} border rounded-xl p-2 shadow-sm backdrop-blur-md">
                    <div class="flex justify-between items-center w-full">
                        <span class="${textColor} font-bold text-xs tracking-wide">${rObj.text}</span>
                        <span class="${isCritical ? 'bg-rose-500 text-white' : 'bg-sky-500/20 text-sky-200'} px-2 py-0.5 rounded-full text-[10px] font-black">
                            ${rData.remaining} ⏳
                        </span>
                    </div>
                    <span class="text-[9px] text-slate-400 opacity-80">${rObj.desc}</span>
                </div>`;
            }).join('');
            
            if (!activeRules.length) ruleHtml = `<div class="bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 font-bold text-xs p-3 text-center rounded-xl backdrop-blur-md">Hiçbir Kural Yok. Özgürsün!</div>`;

            let trapsHtml = traps.map(t => {
                return `<div class="trap-sprite emoji-icon" style="left: ${t.x * CELL_SIZE}px; top: ${t.y * CELL_SIZE}px;">💣</div>`;
            }).join('');

            // CEZA OVERLAY SİSTEMİ
            let overlayHtml = '';
            if (isFrozen) {
                overlayHtml = `
                    <div class="absolute top-4 left-1/2 transform -translate-x-1/2 z-50 bg-rose-900/95 text-white px-5 py-2 rounded-full border border-rose-500/70 shadow-[0_4px_20px_rgba(244,63,94,0.4)] flex items-center gap-3 backdrop-blur-md">
                        <div class="w-2.5 h-2.5 rounded-full bg-rose-400 animate-ping"></div>
                        <span class="font-bold text-[11px] tracking-widest whitespace-nowrap">CEZA BEKLENİYOR (2s)</span>
                    </div>
                `;
            }

            appDiv.innerHTML = `
                <div class="w-full max-w-[450px] mx-auto flex flex-col gap-4">
                    
                    <!-- Puan Paneli -->
                    <div class="glass-panel rounded-2xl p-4 flex justify-between items-center gap-4">
                        <div class="bg-black/40 px-5 py-3 rounded-xl border border-white/5 flex flex-col items-center justify-center min-w-[90px]">
                            <span class="text-slate-400 text-[10px] font-black tracking-widest mb-1">SKOR</span>
                            <span class="text-yellow-400 font-black text-3xl drop-shadow-[0_0_10px_rgba(250,204,21,0.3)]">${score}</span>
                        </div>
                        
                        <div class="flex-1 flex flex-col gap-1.5 h-[80px] overflow-y-auto pr-1">
                            ${ruleHtml}
                        </div>
                    </div>

                    <!-- Oyun Izgarası -->
                    <div id="grid-container" class="grid-bg relative overflow-hidden transition-all duration-200 ${isFrozen ? 'ring-4 ring-rose-500/50' : ''}">
                        
                        <!-- Overlay -->
                        ${overlayHtml}

                        <!-- Oyuncu Emjoi -->
                        <div class="player-sprite emoji-icon" style="left: ${player.x * CELL_SIZE}px; top: ${player.y * CELL_SIZE}px;">
                            ${player.gender === 'boy' ? '👦' : '👧'}
                        </div>
                        
                        <!-- Yıldız -->
                        ${star ? `
                            <div class="star-sprite emoji-icon" style="left: ${star.x * CELL_SIZE}px; top: ${star.y * CELL_SIZE}px;">
                                🌟
                            </div>
                        ` : ''}

                        <!-- Tuzaklar -->
                        ${trapsHtml}
                    </div>

                    <!-- Mobil Yön Butonları -->
                    <div class="grid grid-cols-3 gap-2 w-48 mx-auto sm:hidden mt-2 pb-8">
                        <div></div>
                        <button onclick="movePlayer('up')" class="glass-panel text-white p-4 rounded-2xl border-b-4 border-slate-900 active:translate-y-1 active:border-b-0 text-xl font-black transition-all">W</button>
                        <div></div>
                        <button onclick="movePlayer('left')" class="glass-panel text-white p-4 rounded-2xl border-b-4 border-slate-900 active:translate-y-1 active:border-b-0 text-xl font-black transition-all">A</button>
                        <button onclick="movePlayer('down')" class="glass-panel text-white p-4 rounded-2xl border-b-4 border-slate-900 active:translate-y-1 active:border-b-0 text-xl font-black transition-all">S</button>
                        <button onclick="movePlayer('right')" class="glass-panel text-white p-4 rounded-2xl border-b-4 border-slate-900 active:translate-y-1 active:border-b-0 text-xl font-black transition-all">D</button>
                    </div>
                </div>
            `;
        }

        render();
    </script>
</body>
</html>
